<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Social - AppRopa</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .outfit-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .outfit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .outfit-usuario {
            font-weight: bold;
            color: #667eea;
        }
        
        .outfit-event {
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .outfit-prendas {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .outfit-prenda {
            text-align: center;
            width: 120px;
        }
        
        .outfit-prenda img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .outfit-prenda p {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
        
        .outfit-puntaje {
            text-align: center;
            margin: 15px 0;
        }
        
        .puntaje-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
        }
        
        .puntaje-alto {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .puntaje-bajo {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .outfit-recomendacion {
            background: #f7fafc;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .outfit-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .like-btn:hover {
            transform: scale(1.1);
        }
        
        .like-count {
            font-size: 14px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: white;
        }
        
        .error-message {
            background: #fed7d7;
            color: #742a2a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .filtros {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filtro-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #f0f0f0;
            transition: all 0.3s;
        }
        
        .filtro-btn.active {
            background: #667eea;
            color: white;
        }

        .empty-feed {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>👔 AppRopa</h2>
        <div>
            <span id="userName"></span>
            <a href="menu_principal.html">Inicio</a>
            <a href="closet.html">Mi Closet</a>
            <a href="subir_prenda.html">+ Prenda</a>
            <a href="generar_outfit.html">Generar</a>
            <a href="red_social.html">Red Social</a>
            <a href="#" onclick="logout()">Salir</a>
        </div>
    </div>
    
    <div class="container">
        <h2> Red Social</h2>
        <p>Descubre outfits de otros usuarios y dales like</p>
        
        <div class="filtros">
            <button class="filtro-btn active" data-filtro="todos">Todos</button>
            <button class="filtro-btn" data-filtro="boda"> Boda</button>
            <button class="filtro-btn" data-filtro="trabajo"> Trabajo</button>
            <button class="filtro-btn" data-filtro="diario"> Diario</button>
            <button class="filtro-btn" data-filtro="fiesta"> Fiesta</button>
            <button class="filtro-btn" data-filtro="deporte"> Deporte</button>
        </div>
        
        <div id="feedContainer">
            <div class="loading">Cargando outfits...</div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
    <script>
        // Configuración
        const API_URL = 'http://localhost:3000/api';
        const usuarioId = localStorage.getItem('usuarioId');
        const usuarioNombre = localStorage.getItem('usuarioNombre');
        let outfits = [];
        let filtroActual = 'todos';
        
        // Verificar sesión
        if (!usuarioId) {
            window.location.href = 'login.html';
        }
        
        // Mostrar nombre del usuario
        document.getElementById('userName').innerHTML = ` ${usuarioNombre || 'Usuario'} | `;
    
        // Filtros
        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filtroActual = btn.dataset.filtro;
                mostrarOutfits();
            });
        });
        
        // Cargar red social
        async function cargarFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '<div class="loading"> Cargando outfits...</div>';
            
            try {
                const response = await fetch(`${API_URL}/outfits/feed`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                outfits = await response.json();
                
                if (!Array.isArray(outfits)) {
                    outfits = [];
                }
                
                mostrarOutfits();
                
            } catch (error) {
                console.error('Error al cargar feed:', error);
                container.innerHTML = `
                    <div class="error-message">
                         Error al cargar el feed: ${error.message}<br>
                        <small>Verifica que el backend esté corriendo en ${API_URL}</small>
                    </div>
                `;
            }
        }
        
        // Dar like
        async function darLike(outfitId, btnElement) {
            const likeIcon = btnElement.querySelector('.like-icon');
            const likeCountSpan = btnElement.querySelector('.like-count');
            const outfit = outfits.find(o => o.id === outfitId);
            
            if (!outfit) return;
            
            // Actualizar UI inmediatamente (optimistic update)
            const nuevoEstadoLike = !outfit.usuario_ha_dado_like;
            const nuevoContador = nuevoEstadoLike ? outfit.likes + 1 : outfit.likes - 1;
            
            likeIcon.textContent = nuevoEstadoLike ? '❤️' : '🤍';
            likeCountSpan.textContent = nuevoContador;
            btnElement.style.color = nuevoEstadoLike ? 'red' : '#666';
            
            try {
                const response = await fetch(`${API_URL}/outfits/like/${outfitId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        usuario_id: parseInt(usuarioId),
                        outfit_id: outfitId 
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Error al dar like');
                }
                
                const result = await response.json();
                
                // Actualizar con datos reales del servidor
                outfit.likes = result.likes;
                outfit.usuario_ha_dado_like = result.ha_dado_like;
                
                likeIcon.textContent = outfit.usuario_ha_dado_like ? '❤️' : '🤍';
                likeCountSpan.textContent = outfit.likes;
                btnElement.style.color = outfit.usuario_ha_dado_like ? 'red' : '#666';
                
            } catch (error) {
                console.error('Error al dar like:', error);
                // Revertir cambios
                likeIcon.textContent = outfit.usuario_ha_dado_like ? '❤️' : '🤍';
                likeCountSpan.textContent = outfit.likes;
                btnElement.style.color = outfit.usuario_ha_dado_like ? 'red' : '#666';
                
                alert(' Error al dar like. Intenta de nuevo.');
            }
        }
        
        // Mostrar outfits
        function mostrarOutfits() {
            const container = document.getElementById('feedContainer');
            
            let outfitsFiltrados = outfits;
            if (filtroActual !== 'todos') {
                outfitsFiltrados = outfits.filter(o => o.evento === filtroActual);
            }
            
            if (outfitsFiltrados.length === 0) {
                container.innerHTML = `
                    <div class="empty-feed">
                        📭 No hay outfits para mostrar<br>
                        <small>${filtroActual !== 'todos' ? 'Prueba con otro filtro' : 'Sé el primero en publicar un outfit'}</small>
                    </div>
                `;
                return;
            }
            
            const eventoIcono = {
                'boda': '',
                'trabajo': '',
                'diario': '',
                'fiesta': '',
                'deporte': ''
            };
            
            const eventoNombre = {
                'boda': 'Boda / Formal',
                'trabajo': 'Trabajo / Entrevista',
                'diario': 'Diario / Casual',
                'fiesta': 'Fiesta',
                'deporte': 'Deporte'
            };
            
            container.innerHTML = outfitsFiltrados.map(outfit => `
                <div class="outfit-card" data-outfit-id="${outfit.id}">
                    <div class="outfit-header">
                        <span class="outfit-usuario"> ${escapeHtml(outfit.usuario_nombre || 'Usuario')}</span>
                        <span class="outfit-event">${eventoIcono[outfit.evento] || '📌'} ${eventoNombre[outfit.evento] || outfit.evento}</span>
                    </div>
                    
                    <div class="outfit-prendas">
                        <div class="outfit-prenda">
                            <img src="${outfit.prendas?.superior?.imagen_url || 'https://via.placeholder.com/100x100?text=Superior'}" 
                                 onerror="this.src='https://via.placeholder.com/100x100?text=Superior'">
                            <p>${outfit.prendas?.superior?.estilo || '?'} / ${outfit.prendas?.superior?.color_categoria || '?'}</p>
                        </div>
                        <div class="outfit-prenda">
                            <img src="${outfit.prendas?.inferior?.imagen_url || 'https://via.placeholder.com/100x100?text=Inferior'}" 
                                 onerror="this.src='https://via.placeholder.com/100x100?text=Inferior'">
                            <p>${outfit.prendas?.inferior?.estilo || '?'} / ${outfit.prendas?.inferior?.color_categoria || '?'}</p>
                        </div>
                        ${outfit.prendas?.calzado ? `
                        <div class="outfit-prenda">
                            <img src="${outfit.prendas.calzado.imagen_url}" 
                                 onerror="this.src='https://via.placeholder.com/100x100?text=Calzado'">
                            <p>${outfit.prendas.calzado.estilo || '?'} / ${outfit.prendas.calzado.color_categoria || '?'}</p>
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="outfit-puntaje">
                        <span class="puntaje-badge ${parseInt(outfit.puntaje) >= 7 ? 'puntaje-alto' : 'puntaje-bajo'}">
                             ${outfit.puntaje}
                        </span>
                    </div>
                    
                    <div class="outfit-recomendacion">
                        <strong>💡 Recomendación:</strong> ${escapeHtml(outfit.recomendaciones?.[0] || outfit.recomendacion_ia || 'Sin recomendación')}
                    </div>
                    
                    <div class="outfit-footer">
                        <button class="like-btn" onclick="darLike(${outfit.id}, this)">
                            <span class="like-icon">${outfit.usuario_ha_dado_like ? '❤️' : '🤍'}</span>
                            <span class="like-count">${outfit.likes || 0}</span>
                        </button>
                        <small>${formatDate(outfit.fecha_publicacion)}</small>
                    </div>
                </div>
            `).join('');
        }
        
        // Funciones auxiliares
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'Recientemente';
            try {
                const date = new Date(dateString);
                const ahora = new Date();
                const diff = Math.floor((ahora - date) / (1000 * 60 * 60 * 24));
                
                if (diff === 0) return 'Hoy';
                if (diff === 1) return 'Ayer';
                if (diff < 7) return `Hace ${diff} días`;
                return date.toLocaleDateString();
            } catch {
                return 'Recientemente';
            }
        }
        
        // Cargar red social al iniciar
        cargarFeed();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - AppRopa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <h2 style="text-align: center; margin-bottom: 30px;">📝 Crear Cuenta</h2>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" id="nombre" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>Correo electronico</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
            </form>
            
            <div id="mensaje" style="margin-top: 20px;"></div>
            
            <p style="text-align: center; margin-top: 20px;">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesion</a>
            </p>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch(`${API_URL}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('mensaje').innerHTML = 
                        '<div class="alert alert-success"> Registro exitoso. Redirigiendo al login...</div>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    document.getElementById('mensaje').innerHTML = 
                        `<div class="alert alert-danger"> ${result.mensaje || 'Error al registrar'}</div>`;
                }
            } catch (error) {
                document.getElementById('mensaje').innerHTML = 
                    `<div class="alert alert-danger"> Error de conexión: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>

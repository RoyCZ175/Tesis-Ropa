<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Outfit - AppRopa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <h2>👔 AppRopa</h2>
        <div>
            <span id="userName"></span>
            <a href="menu_principal.html">Inicio</a>
            <a href="closet.html">Mi Closet</a>
            <a href="subir_prenda.html">+ Prenda</a>
            <a href="generar_outfit.html">Generar</a>
            <a href="red_social.html">Red Social</a>
            <a href="#" onclick="logout()">Cerrar Sesion</a>
        </div>
    </div>
    
    <div class="container">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2> Generar Outfit </h2>
            <p>El sistema seleccionará aleatoriamente una combinación de tu armario</p>
            
            <button id="generarBtn" class="btn btn-primary" style="margin: 20px 0;"> Generar Outfit</button>
            
            <div id="resultado" style="display: none;">
                <h3> Combinación sugerida:</h3>
                <div id="outfitContainer" class="grid-2"></div>
                
                <div style="margin-top: 20px;">
                    <label>Selecciona el evento para evaluar:</label>
                    <select id="evento" class="form-control" style="margin: 10px 0;">
                        <option value="trabajo"> Trabajo / Entrevista</option>
                        <option value="boda">Boda / Formal</option>
                        <option value="fiesta">Fiesta</option>
                        <option value="diario"> Diario / Casual</option>
                        <option value="deporte"> Deporte</option>
                    </select>
                    <button id="evaluarBtn" class="btn btn-success"> Evaluar con IA</button>
                </div>
                
                <div id="evaluacionResultado" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';
        const usuarioId = localStorage.getItem('usuarioId');
        let outfitActual = null;
        
        if (!usuarioId) {
            window.location.href = 'login.html';
        }
        
        document.getElementById('userName').innerHTML = ` ${localStorage.getItem('usuarioNombre')} | `;
        
        document.getElementById('generarBtn').addEventListener('click', async () => {
            try {
                const response = await fetch(`${API_URL}/outfits/sugerir/${usuarioId}`);
                const result = await response.json();
                
                if (response.ok) {
                    outfitActual = result.combinacion;
                    mostrarOutfit(outfitActual);
                    document.getElementById('resultado').style.display = 'block';
                } else {
                    alert('Error: ' + (result.mensaje || 'No hay suficientes prendas'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        function mostrarOutfit(outfit) {
            const container = document.getElementById('outfitContainer');
            container.innerHTML = `
                <div class="prenda-card">
                    <img src="${outfit.prenda_superior.imagen_url}" onerror="this.src='https://via.placeholder.com/300x200?text=Superior'">
                    <div class="info">
                        <h4>👕 Superior</h4>
                        <p>Estilo: ${outfit.prenda_superior.estilo}</p>
                        <p>Color: ${outfit.prenda_superior.color_categoria}</p>
                    </div>
                </div>
                <div class="prenda-card">
                    <img src="${outfit.prenda_inferior.imagen_url}" onerror="this.src='https://via.placeholder.com/300x200?text=Inferior'">
                    <div class="info">
                        <h4>👖 Inferior</h4>
                        <p>Estilo: ${outfit.prenda_inferior.estilo}</p>
                        <p>Color: ${outfit.prenda_inferior.color_categoria}</p>
                    </div>
                </div>
            `;
        }
        
        document.getElementById('evaluarBtn').addEventListener('click', async () => {
            if (!outfitActual) return;
            
            const evento = document.getElementById('evento').value;
            
            const data = {
                prenda_superior: {
                    estilo: outfitActual.prenda_superior.estilo,
                    color_categoria: outfitActual.prenda_superior.color_categoria
                },
                prenda_inferior: {
                    estilo: outfitActual.prenda_inferior.estilo,
                    color_categoria: outfitActual.prenda_inferior.color_categoria
                },
                evento: evento
            };
            
            try {
                const response = await fetch(`${API_URL}/ia/evaluar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                const evaluacionDiv = document.getElementById('evaluacionResultado');
                const puntaje = parseInt(result.puntaje);
                const esAdecuado = puntaje >= 7;
                
                evaluacionDiv.innerHTML = `
                    <div class="outfit-card" style="background: ${esAdecuado ? '#c6f6d5' : '#fed7d7'}">
                        <h3>📊 Resultado de evaluación</h3>
                        <p><strong>Puntaje:</strong> ${result.puntaje}</p>
                        <p><strong>Evaluación:</strong> ${result.evaluacion}</p>
                        <p><strong>Recomendaciones:</strong></p>
                        <ul>
                            ${result.recomendaciones.map(r => `<li>${r}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } catch (error) {
                alert('Error al evaluar: ' + error.message);
            }
        });
    </script>
</body>
</html>
